name: ci

on:
  pull_request:
    branches: [main, dev, rust]
  push:
    branches: [main, dev, rust]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.1

      - name: Install npm dependencies
        run: npm ci

      - name: Check TypeScript renderer
        run: npm run build:ts

      - name: Check npm launcher syntax
        run: node --check npm/bin/starling.js

      - name: Run Rust tests
        working-directory: rust
        shell: bash
        run: |
          set +e
          mkdir -p ../ci-logs
          cargo test > ../ci-logs/cargo-test.log 2>&1
          status=$?
          cat ../ci-logs/cargo-test.log
          exit "$status"

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: ci-logs/*.log
          if-no-files-found: ignore
