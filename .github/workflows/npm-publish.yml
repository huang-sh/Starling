name: NPM package smoke

on:
  pull_request:
    branches: [main, dev, rust]
  push:
    branches: [main, dev, rust]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    name: Pack starling-ai
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build TypeScript renderer
        run: npm run build:ts

      - name: Stage npm package assets
        run: |
          mkdir -p npm/scripts
          cp scripts/install-agent-skills.js npm/scripts/
          rm -rf npm/skills
          cp -R skills npm/skills

      - name: Pack meta-package
        run: |
          mkdir -p dist
          npm pack ./npm --pack-destination dist

      - name: Upload meta-package
        uses: actions/upload-artifact@v4
        with:
          name: starling-ai-smoke
          path: dist/starling-ai-*.tgz
          if-no-files-found: error
