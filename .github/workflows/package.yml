name: Package Starling

on:
  push:
    branches: [main, dev, rust]
  pull_request:
    branches: [main, dev, rust]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  package-native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: starling-linux-x64
          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: starling-darwin-x64
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            artifact: starling-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install npm dependencies
        run: npm ci

      - name: Build and stage native binary
        run: npm run build -- --target=${{ matrix.target }}

      - name: Test staged binary
        run: npm run run -- --version

      - name: Pack native npm package
        run: scripts/stage_npm_packages.sh ${{ matrix.target }}

      - name: Upload native package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}/*.tgz
          if-no-files-found: error

  package-js:
    name: starling-ai npm package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build TypeScript renderer
        run: npm run build:ts

      - name: Stage npm package assets
        run: |
          mkdir -p npm/scripts
          cp scripts/install-agent-skills.js npm/scripts/
          rm -rf npm/skills
          cp -R skills npm/skills

      - name: Pack main npm package
        run: |
          mkdir -p dist
          npm pack ./npm --pack-destination dist

      - name: Upload main npm package
        uses: actions/upload-artifact@v4
        with:
          name: starling-ai
          path: dist/starling-ai-*.tgz
          if-no-files-found: error
